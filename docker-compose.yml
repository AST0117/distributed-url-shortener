services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MYSQL_HOST=url-shortener-db.cn04uske4iaw.ap-south-1.rds.amazonaws.com
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=Urlshortener123!
      - MYSQL_DB=urlshortener
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_started
    restart: on-failure

  redis:
    image: redis:7
    ports:
      - "6379:6379"
